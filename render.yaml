services:
  - type: web
    name: samplas-m-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_REASONING_EFFORT
        value: low
