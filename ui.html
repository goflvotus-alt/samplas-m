<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SAMPLAS M</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f7;
        --surface: rgba(255, 255, 255, 0.92);
        --surface-strong: #ffffff;
        --bg-secondary: #eef5ff;
        --border: #d2d2d7;
        --border-strong: #b9b9c0;
        --text: #1d1d1f;
        --muted: #6e6e73;
        --brand: #0071e3;
        --brand-strong: #005bbf;
        --danger: #c8193c;
        --success: #147a3d;
        --radius: 14px;
        --shadow: 0 14px 34px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 12px/1.48 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", "Apple Gothic", "Segoe UI", sans-serif;
      }

      .app {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      header {
        border-bottom: 1px solid var(--border);
        background: rgba(245, 245, 247, 0.86);
        padding: 14px 16px 12px;
      }

      .plugin-brand {
        display: grid;
        gap: 3px;
      }

      .plugin-wordmark {
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Apple SD Gothic Neo", Arial, sans-serif;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 0.92;
        text-transform: uppercase;
      }

      .plugin-byline {
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
      }

      main {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        padding: 12px;
      }

      section {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 12px;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .field {
        display: grid;
        gap: 5px;
        margin-bottom: 9px;
      }

      .hint {
        color: var(--muted);
        font-size: 11px;
      }

      .inline-status {
        min-height: 16px;
        color: var(--muted);
        font-size: 11px;
      }

      .inline-status.ok {
        color: var(--success);
      }

      .inline-status.error {
        color: var(--danger);
      }

      label {
        color: var(--muted);
        font-weight: 700;
      }

      input,
      textarea,
      select,
      button {
        font: inherit;
      }

      input[type="text"],
      input[type="number"],
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface-strong);
        color: var(--text);
        padding: 8px 9px;
        outline: none;
      }

      input[type="text"]:focus,
      input[type="number"]:focus,
      textarea:focus,
      select:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.14);
      }

      textarea {
        min-height: 70px;
        resize: vertical;
      }

      input[type="file"] {
        width: 100%;
        color: var(--muted);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .api-control {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .api-control input[readonly] {
        background: var(--bg-secondary);
        color: var(--muted);
      }

      .context-menu {
        position: fixed;
        z-index: 20;
        display: grid;
        min-width: 118px;
        gap: 4px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface-strong);
        box-shadow: var(--shadow);
        padding: 6px;
      }

      .context-menu.hidden {
        display: none;
      }

      .context-menu button {
        min-height: 28px;
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        padding: 5px 8px;
        text-align: left;
      }

      .context-menu button:hover {
        background: var(--bg-secondary);
      }

      .page-nav {
        display: grid;
        grid-template-columns: 34px 1fr 34px;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }

      .page-title {
        display: grid;
        gap: 2px;
        justify-items: center;
      }

      .page-title strong {
        font-size: 13px;
      }

      .page-title span {
        color: var(--muted);
      }

      .page-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .page-tab {
        min-height: 26px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface-strong);
        color: var(--text);
        padding: 4px 9px;
      }

      .page-tab.active {
        border-color: var(--brand);
        background: var(--brand);
        color: #ffffff;
      }

      .file-name {
        min-height: 16px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .image-upload-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(0, 1fr) 104px;
        align-items: start;
      }

      .image-preview-popover {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface-strong);
        display: grid;
        gap: 6px;
        padding: 6px;
      }

      .image-preview-popover.hidden {
        display: none;
      }

      .image-preview {
        aspect-ratio: 1 / 1;
        background-color: var(--bg-secondary);
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        border: 1px solid var(--border);
        border-radius: 9px;
        width: 100%;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        min-height: 34px;
        padding: 8px 11px;
        font-weight: 700;
      }

      button.primary {
        background: var(--brand);
        color: #ffffff;
      }

      button.primary:hover {
        background: var(--brand-strong);
      }

      button.secondary,
      button.icon {
        border: 1px solid var(--border);
        background: var(--surface-strong);
        color: var(--text);
      }

      button.icon {
        min-width: 34px;
        padding: 0;
        font-size: 18px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .generated-list {
        display: grid;
        gap: 8px;
      }

      .generated-item {
        display: grid;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface-strong);
        padding: 10px;
      }

      .generated-name {
        font-weight: 700;
      }

      .guideline-preview,
      .template-report {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface-strong);
        color: var(--muted);
        font-size: 11px;
        padding: 8px 9px;
      }

      .guideline-preview.connected {
        color: var(--text);
      }

      .template-report.hidden {
        display: none;
      }

      .template-report {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .template-report strong {
        color: var(--text);
      }

      .template-row {
        display: grid;
        gap: 4px;
        border-top: 1px solid var(--border);
        padding-top: 7px;
      }

      .template-row:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .template-issues {
        display: grid;
        gap: 3px;
      }

      .template-issues span {
        color: var(--muted);
      }

      .template-issues .error {
        color: var(--danger);
      }

      .template-issues .warning {
        color: #9a5a00;
      }

      .status {
        min-height: 34px;
        border-top: 1px solid var(--border);
        background: rgba(245, 245, 247, 0.92);
        color: var(--muted);
        padding: 10px 16px;
      }

      .status.error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="plugin-brand">
          <div class="plugin-wordmark" aria-label="SAMPLAS">SAMPLAS</div>
          <span class="plugin-byline">by Jonghyun Je</span>
        </div>
      </header>

      <main>
        <section>
          <h2>전체 설정</h2>

          <div class="field">
            <label for="postCaption">캡션</label>
            <textarea id="postCaption" placeholder="슬라이드를 업로드할 때 사용할 전체 캡션"></textarea>
          </div>

          <div class="field">
            <label for="mood">전체 분위기</label>
            <textarea id="mood" placeholder="예: 담백하게, 전시 소개처럼, 날카롭지만 친절하게"></textarea>
          </div>

          <div class="field">
            <label for="backendUrl">Backend API URL</label>
            <div class="api-control">
              <input id="backendUrl" type="text" placeholder="https://your-backend.vercel.app" />
              <button id="pasteApiButton" class="secondary" type="button">Paste</button>
            </div>
            <div class="hint">저장 후에는 우클릭 메뉴의 Edit/Delete로만 변경됩니다.</div>
            <div id="apiStatus" class="inline-status">Backend URL을 붙여넣고 Test Backend를 눌러주세요.</div>
          </div>

          <div id="apiContextMenu" class="context-menu hidden">
            <button id="editApiButton" type="button">Edit</button>
            <button id="deleteApiButton" type="button">Delete</button>
          </div>

          <div class="actions">
            <button id="testBackendButton" class="secondary" type="button">Test Backend</button>
            <button id="aiGenerateButton" class="primary" type="button">AI로 다듬기</button>
          </div>
        </section>

        <section>
          <h2>페이지별 콘텐츠</h2>

          <div class="page-nav">
            <button id="prevPageButton" class="icon" type="button">‹</button>
            <div class="page-title">
              <strong id="pageTitle">Page 1</strong>
              <span id="pageCount">1 / 1</span>
            </div>
            <button id="nextPageButton" class="icon" type="button">›</button>
          </div>

          <div id="pageTabs" class="page-tabs"></div>

          <div class="row">
            <div class="field">
              <label for="pageFormat">콘텐츠 양식</label>
              <select id="pageFormat">
                <option value="cover">Cover</option>
                <option value="story">Story</option>
                <option value="information">Information</option>
                <option value="quote">Quote</option>
                <option value="closing">Closing</option>
              </select>
            </div>

            <div class="field">
              <label for="pageCategory">콘텐츠 카테고리</label>
              <input id="pageCategory" type="text" value="Category" list="contentCategoryOptions" />
              <datalist id="contentCategoryOptions"></datalist>
              <div class="hint">관리자 가이드라인의 콘텐츠 카테고리와 연결됩니다.</div>
              <div id="guidelinePreview" class="guideline-preview">가이드라인: Backend 연결 후 불러오기</div>
            </div>
          </div>

          <div class="field">
            <label for="pageHeadline">제목</label>
            <input id="pageHeadline" type="text" />
          </div>

          <div class="field">
            <label for="pageText">텍스트</label>
            <textarea id="pageText"></textarea>
          </div>

          <div class="field">
            <label for="pageImage">사진</label>
            <div class="image-upload-grid">
              <input id="pageImage" type="file" accept="image/png,image/jpeg,image/webp" />
              <div id="imagePreviewPopover" class="image-preview-popover hidden">
                <div id="imagePreview" class="image-preview"></div>
                <div id="pageImageName" class="file-name"></div>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="pageImageFocus">사진 초점</label>
            <select id="pageImageFocus">
              <option value="center">Center</option>
              <option value="top">Top</option>
              <option value="bottom">Bottom</option>
              <option value="left">Left</option>
              <option value="right">Right</option>
            </select>
          </div>

          <div class="actions">
            <button id="addPageButton" class="secondary" type="button">+ Page</button>
            <button id="removePageButton" class="secondary" type="button">Remove</button>
            <button id="refreshFormatsButton" class="secondary" type="button">양식 동기화</button>
            <button id="validateTemplatesButton" class="secondary" type="button">템플릿 검사</button>
            <button id="draftGenerateButton" class="secondary" type="button">템플릿 생성</button>
          </div>

          <div id="templateReport" class="template-report hidden"></div>
        </section>

        <section>
          <h2>Generated Cards</h2>
          <div id="generatedList" class="generated-list"></div>
        </section>

        <section>
          <h2>Export</h2>
          <div class="actions">
            <button id="exportButton" class="secondary" type="button">Export Selected PNG</button>
          </div>
        </section>
      </main>

      <div id="status" class="status">Ready</div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      const statusEl = $("status");
      const generatedList = $("generatedList");
      const backendUrlInput = $("backendUrl");
      const apiStatus = $("apiStatus");
      const pasteApiButton = $("pasteApiButton");
      const apiContextMenu = $("apiContextMenu");
      const editApiButton = $("editApiButton");
      const deleteApiButton = $("deleteApiButton");
      const testBackendButton = $("testBackendButton");
      const aiGenerateButton = $("aiGenerateButton");
      const draftGenerateButton = $("draftGenerateButton");
      const exportButton = $("exportButton");
      const prevPageButton = $("prevPageButton");
      const nextPageButton = $("nextPageButton");
      const addPageButton = $("addPageButton");
      const removePageButton = $("removePageButton");
      const refreshFormatsButton = $("refreshFormatsButton");
      const validateTemplatesButton = $("validateTemplatesButton");
      const pageTabs = $("pageTabs");
      const contentCategoryOptions = $("contentCategoryOptions");
      const guidelinePreview = $("guidelinePreview");
      const templateReport = $("templateReport");
      const imagePreviewPopover = $("imagePreviewPopover");
      const imagePreview = $("imagePreview");

      let generatedFrames = [];
      let currentPageIndex = 0;
      let availableFormats = [];
      let contentCategories = [];
      let contentCategorySummaries = [];
      let isBackendUrlLocked = false;
      let pages = [createPage()];

      function createPage() {
        return {
          format: "cover",
          category: "Category",
          title: "",
          text: "",
          imageFocus: "center",
          imageFile: null,
          imageName: "",
          imagePreviewUrl: ""
        };
      }

      testBackendButton.addEventListener("click", async () => {
        try {
          setBusy(testBackendButton, true, "Testing...");
          setApiStatus("Testing backend connection...");
          setStatus("Testing backend connection...");
          const backendUrl = getBackendUrlForRequest();
          const response = await fetchWithTimeout(`${backendUrl}/health`, {
            timeoutMs: 12000
          });
          const data = await response.json().catch(() => ({}));

          if (!response.ok || data.ok !== true) {
            throw new Error("Backend health check failed.");
          }

          setApiStatus("Backend connected.", false, true);
          setStatus("Backend is connected.");
          await loadContentCategories();
        } catch (error) {
          const message = toUserErrorMessage(error, "Backend test failed.");
          setApiStatus(message, true);
          setStatus(message, true);
        } finally {
          setBusy(testBackendButton, false, "Test Backend");
        }
      });

      pasteApiButton.addEventListener("click", async () => {
        try {
          const pastedText = await navigator.clipboard.readText();
          const backendUrl = normalizeBackendUrl(pastedText);
          saveBackendUrl(backendUrl);
          setApiStatus("Backend API URL saved. Click Test Backend.");
          setStatus("Backend API URL saved.");
        } catch (error) {
          unlockBackendUrl();
          backendUrlInput.focus();
          setApiStatus("Paste failed. Click the API field, paste manually, then press Enter.", true);
          setStatus("Paste permission failed. Click the API field, paste manually, then press Enter.", true);
        }
      });

      backendUrlInput.addEventListener("contextmenu", (event) => {
        event.preventDefault();
        showApiContextMenu(event.clientX, event.clientY);
      });

      backendUrlInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !backendUrlInput.readOnly) {
          event.preventDefault();
          saveBackendUrl(normalizeBackendUrl(backendUrlInput.value));
          setApiStatus("Backend API URL saved. Click Test Backend.");
          setStatus("Backend API URL saved.");
        }
      });

      backendUrlInput.addEventListener("blur", () => {
        if (!backendUrlInput.readOnly && backendUrlInput.value.trim()) {
          saveBackendUrl(normalizeBackendUrl(backendUrlInput.value));
        }
      });

      editApiButton.addEventListener("click", () => {
        hideApiContextMenu();
        unlockBackendUrl();
        backendUrlInput.focus();
        backendUrlInput.select();
        setApiStatus("Editing enabled. Press Enter after editing.");
        setStatus("Backend API URL unlocked. Press Enter after editing.");
      });

      deleteApiButton.addEventListener("click", () => {
        hideApiContextMenu();
        backendUrlInput.value = "";
        unlockBackendUrl();
        parent.postMessage({ pluginMessage: { type: "delete-backend-url" } }, "*");
        setApiStatus("Backend API URL deleted.", true);
        setStatus("Backend API URL deleted.");
      });

      document.addEventListener("click", (event) => {
        if (!apiContextMenu.contains(event.target)) {
          hideApiContextMenu();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          hideApiContextMenu();
        }
      });

      aiGenerateButton.addEventListener("click", async () => {
        try {
          saveCurrentPage();
          validatePages();
          setBusy(aiGenerateButton, true, "다듬는 중...");
          setStatus("AI가 페이지별 문장을 다듬는 중...");

          const backendUrl = getBackendUrlForRequest();
          const response = await fetch(`${backendUrl}/api/generate-card-news`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              postCaption: $("postCaption").value.trim(),
              mood: $("mood").value.trim(),
              pages: pages.map(toBackendPage)
            })
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(data.error || "AI generation failed.");
          }

          if (!data.cards || !Array.isArray(data.cards)) {
            throw new Error("The backend returned an invalid cards payload.");
          }

          if (typeof data.postCaption === "string" && data.postCaption.trim()) {
            $("postCaption").value = data.postCaption.trim();
          }

          const cards = await attachPageImages(data.cards.map(normalizeCard));
          parent.postMessage({ pluginMessage: { type: "generate-cards", cards } }, "*");
        } catch (error) {
          setStatus(toUserErrorMessage(error, "AI generation failed."), true);
        } finally {
          setBusy(aiGenerateButton, false, "AI로 다듬기");
        }
      });

      draftGenerateButton.addEventListener("click", async () => {
        try {
          saveCurrentPage();
          validatePages();
          setBusy(draftGenerateButton, true, "생성 중...");
          const cards = await attachPageImages(pages.map(pageToDraftCard));
          parent.postMessage({ pluginMessage: { type: "generate-cards", cards } }, "*");
          setStatus("Generating cards...");
        } catch (error) {
          setStatus(error.message || "Card generation failed.", true);
        } finally {
          setBusy(draftGenerateButton, false, "템플릿 생성");
        }
      });

      prevPageButton.addEventListener("click", () => {
        goToPage(Math.max(0, currentPageIndex - 1));
      });

      nextPageButton.addEventListener("click", () => {
        goToPage(Math.min(pages.length - 1, currentPageIndex + 1));
      });

      addPageButton.addEventListener("click", () => {
        saveCurrentPage();
        pages.push(createPage());
        goToPage(pages.length - 1);
      });

      removePageButton.addEventListener("click", () => {
        const removedPage = pages[currentPageIndex];
        if (removedPage && removedPage.imagePreviewUrl) {
          URL.revokeObjectURL(removedPage.imagePreviewUrl);
        }

        if (pages.length === 1) {
          pages = [createPage()];
          goToPage(0);
          return;
        }

        pages.splice(currentPageIndex, 1);
        goToPage(Math.max(0, currentPageIndex - 1));
      });

      refreshFormatsButton.addEventListener("click", () => {
        saveCurrentPage();
        parent.postMessage({ pluginMessage: { type: "load-formats" } }, "*");
        setStatus("Loading content formats...");
      });

      validateTemplatesButton.addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "validate-templates" } }, "*");
        setStatus("Checking templates...");
      });

      $("pageImage").addEventListener("change", () => {
        const file = $("pageImage").files[0];
        const page = pages[currentPageIndex];
        if (page.imagePreviewUrl) {
          URL.revokeObjectURL(page.imagePreviewUrl);
        }
        page.imageFile = file || null;
        page.imageName = file ? file.name : "";
        page.imagePreviewUrl = file ? URL.createObjectURL(file) : "";
        updateImagePreview();
      });

      $("pageImageFocus").addEventListener("change", () => {
        pages[currentPageIndex].imageFocus = $("pageImageFocus").value;
        updateImagePreview();
      });

      $("pageFormat").addEventListener("change", () => {
        pages[currentPageIndex].format = $("pageFormat").value;
        updateImagePreview();
      });

      $("pageCategory").addEventListener("input", () => {
        pages[currentPageIndex].category = $("pageCategory").value.trim();
        updateGuidelinePreview();
      });

      exportButton.addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "export-selected" } }, "*");
        setStatus("Exporting selected cards...");
      });

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "generated") {
          generatedFrames = message.frames;
          renderGeneratedFrames();
          setStatus(`Generated ${message.frames.length} card${message.frames.length === 1 ? "" : "s"}.`);
          return;
        }

        if (message.type === "available-formats") {
          applyAvailableFormats(message.formats || []);
          setStatus(`Loaded content formats from ${message.templatePageName || "current page"}.`);
          return;
        }

        if (message.type === "template-validation") {
          renderTemplateValidation(message);
          setStatus(
            message.errorCount
              ? `${message.errorCount} template issue${message.errorCount === 1 ? "" : "s"} found.`
              : "Templates checked."
          );
          return;
        }

        if (message.type === "settings-loaded") {
          applySettings(message.settings || {});
          return;
        }

        if (message.type === "image-applied") {
          setStatus("Image updated.");
          return;
        }

        if (message.type === "export-complete") {
          downloadFiles(message.files);
          setStatus(`Downloaded ${message.files.length} PNG file${message.files.length === 1 ? "" : "s"}.`);
          return;
        }

        if (message.type === "error") {
          setStatus(message.message, true);
        }
      };

      function saveCurrentPage() {
        const page = pages[currentPageIndex];

        if (!page) {
          return;
        }

        page.format = $("pageFormat").value;
        page.category = $("pageCategory").value.trim();
        page.title = $("pageHeadline").value.trim();
        page.text = $("pageText").value.trim();
        page.imageFocus = $("pageImageFocus").value;
      }

      function loadCurrentPage() {
        const page = pages[currentPageIndex];
        ensureFormatOption(page.format);
        $("pageFormat").value = page.format;
        $("pageCategory").value = page.category;
        $("pageHeadline").value = page.title;
        $("pageText").value = page.text;
        $("pageImageFocus").value = page.imageFocus;
        $("pageImage").value = "";
        updateImagePreview();
        updateGuidelinePreview();
        $("pageTitle").textContent = `Page ${currentPageIndex + 1}`;
        $("pageCount").textContent = `${currentPageIndex + 1} / ${pages.length}`;
        prevPageButton.disabled = currentPageIndex === 0;
        nextPageButton.disabled = currentPageIndex === pages.length - 1;
        renderPageTabs();
      }

      function applyAvailableFormats(formats) {
        availableFormats = formats.length ? formats : getFallbackFormats();
        renderFormatOptions();

        for (const page of pages) {
          if (!availableFormats.some((format) => format.value === page.format)) {
            page.format = availableFormats[0].value;
          }
        }

        loadCurrentPage();
      }

      function renderFormatOptions() {
        const select = $("pageFormat");
        select.innerHTML = "";

        for (const format of availableFormats) {
          const option = document.createElement("option");
          option.value = format.value;
          option.textContent = format.label;
          select.appendChild(option);
        }
      }

      function ensureFormatOption(value) {
        if (!value || Array.from($("pageFormat").options).some((option) => option.value === value)) {
          return;
        }

        const option = document.createElement("option");
        option.value = value;
        option.textContent = formatToCategory(value);
        $("pageFormat").appendChild(option);
      }

      function getFallbackFormats() {
        return [
          { value: "cover", label: "Cover", imageAspectRatio: 1 },
          { value: "story", label: "Story", imageAspectRatio: 1 },
          { value: "information", label: "Information", imageAspectRatio: 1 },
          { value: "quote", label: "Quote", imageAspectRatio: 1 },
          { value: "closing", label: "Closing", imageAspectRatio: 1 }
        ];
      }

      function goToPage(index) {
        saveCurrentPage();
        currentPageIndex = index;
        loadCurrentPage();
      }

      function renderPageTabs() {
        pageTabs.innerHTML = "";

        pages.forEach((_page, index) => {
          const button = document.createElement("button");
          button.className = `page-tab${index === currentPageIndex ? " active" : ""}`;
          button.type = "button";
          button.textContent = `› ${index + 1}`;
          button.addEventListener("click", () => goToPage(index));
          pageTabs.appendChild(button);
        });
      }

      async function loadContentCategories() {
        const rawUrl = backendUrlInput.value.trim();
        if (!rawUrl) return;

        const backendUrl = normalizeBackendUrl(rawUrl);
        const response = await fetchWithTimeout(`${backendUrl}/api/guidelines`, {
          timeoutMs: 12000
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok || !Array.isArray(data.categories)) {
          return;
        }

        contentCategorySummaries = data.categories.map(normalizeContentCategory).filter((category) => category.name);
        contentCategories = contentCategorySummaries.map((category) => category.name);
        renderContentCategoryOptions();
        updateGuidelinePreview();
      }

      function renderContentCategoryOptions() {
        contentCategoryOptions.innerHTML = "";

        for (const category of contentCategories) {
          const option = document.createElement("option");
          option.value = category;
          contentCategoryOptions.appendChild(option);
        }
      }

      function normalizeContentCategory(category) {
        const rules = category && typeof category.rules === "object" && category.rules ? category.rules : {};
        const ruleCount = Object.keys(rules).reduce((total, key) => {
          const value = rules[key];
          return total + (Array.isArray(value) ? value.length : 0);
        }, 0);
        const references = Array.isArray(category && category.references) ? category.references : [];

        return {
          name: String((category && category.name) || "").trim(),
          ruleCount,
          referencesCount: references.length
        };
      }

      function updateGuidelinePreview() {
        const categoryName = $("pageCategory").value.trim();
        const summary = contentCategorySummaries.find((category) => normalizeKey(category.name) === normalizeKey(categoryName));

        guidelinePreview.classList.toggle("connected", Boolean(summary));

        if (!contentCategorySummaries.length) {
          guidelinePreview.textContent = "가이드라인: Backend 연결 후 불러오기";
          return;
        }

        if (!categoryName) {
          guidelinePreview.textContent = "가이드라인: 콘텐츠 카테고리를 선택하세요";
          return;
        }

        if (!summary) {
          guidelinePreview.textContent = "가이드라인: 새 카테고리 또는 아직 저장되지 않은 카테고리";
          return;
        }

        guidelinePreview.textContent = `가이드라인: ${summary.ruleCount} rules, ${summary.referencesCount} refs`;
      }

      function renderTemplateValidation(message) {
        const reports = Array.isArray(message.reports) ? message.reports : [];
        templateReport.innerHTML = "";
        templateReport.classList.remove("hidden");

        const summary = document.createElement("strong");
        summary.textContent = reports.length
          ? `${message.templatePageName || "Templates"}: ${reports.length} templates, ${message.errorCount || 0} errors, ${message.warningCount || 0} warnings`
          : "No CARD_TEMPLATE frames found.";
        templateReport.appendChild(summary);

        for (const report of reports) {
          const row = document.createElement("div");
          row.className = "template-row";

          const title = document.createElement("strong");
          title.textContent = `${report.templateName} (${report.format || "default"})`;
          row.appendChild(title);

          const issues = document.createElement("div");
          issues.className = "template-issues";

          const errors = Array.isArray(report.errors) ? report.errors : [];
          const warnings = Array.isArray(report.warnings) ? report.warnings : [];

          if (!errors.length && !warnings.length) {
            const ok = document.createElement("span");
            ok.textContent = "Ready";
            issues.appendChild(ok);
          }

          for (const error of errors) {
            const item = document.createElement("span");
            item.className = "error";
            item.textContent = `Error: ${error}`;
            issues.appendChild(item);
          }

          for (const warning of warnings) {
            const item = document.createElement("span");
            item.className = "warning";
            item.textContent = `Warning: ${warning}`;
            issues.appendChild(item);
          }

          row.appendChild(issues);
          templateReport.appendChild(row);
        }
      }

      function normalizeKey(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[\s_-]+/g, "")
          .replace(/[^a-z0-9가-힣]+/gi, "");
      }

      function validatePages() {
        const hasContent = pages.some((page) => page.title || page.text || page.imageFile);

        if (!hasContent) {
          throw new Error("Add at least one page title, text, or photo.");
        }
      }

      function toBackendPage(page, index) {
        return {
          pageNumber: index + 1,
          format: page.format,
          category: page.category,
          title: page.title,
          text: page.text,
          imageFocus: page.imageFocus,
          hasImage: Boolean(page.imageFile),
          imageName: page.imageName
        };
      }

      function pageToDraftCard(page) {
        return {
          format: page.format,
          title: page.title,
          body: page.text,
          caption: $("postCaption").value.trim(),
          category: page.category || formatToCategory(page.format),
          imageFocus: page.imageFocus,
          backgroundColor: "#f2eee8",
          overlayOpacity: 40
        };
      }

      async function attachPageImages(cards) {
        return Promise.all(
          cards.map(async (card, index) => {
            const page = pages[index];
            if (page && page.imageFile) {
              return {
                ...card,
                imageFocus: page.imageFocus,
                imageBytes: await fileToBytes(page.imageFile)
              };
            }

            return {
              ...card,
              imageFocus: page ? page.imageFocus : card.imageFocus
            };
          })
        );
      }

      function renderGeneratedFrames() {
        generatedList.innerHTML = "";

        if (!generatedFrames.length) {
          generatedList.textContent = "No generated cards yet.";
          return;
        }

        for (const frame of generatedFrames) {
          const item = document.createElement("div");
          item.className = "generated-item";

          const name = document.createElement("div");
          name.className = "generated-name";
          name.textContent = frame.name;

          const input = document.createElement("input");
          input.type = "file";
          input.accept = "image/png,image/jpeg,image/webp";
          input.addEventListener("change", async () => {
            const file = input.files[0];
            if (!file) return;

            try {
              setStatus(`Updating ${frame.name} image...`);
              parent.postMessage(
                {
                  pluginMessage: {
                    type: "apply-image-to-card",
                    frameId: frame.id,
                    imageBytes: await fileToBytes(file)
                  }
                },
                "*"
              );
            } catch (error) {
              setStatus(error.message || "Image update failed.", true);
            }
          });

          item.append(name, input);
          generatedList.appendChild(item);
        }
      }

      function updateImagePreview() {
        const page = pages[currentPageIndex];
        $("pageImageName").textContent = page.imageName;

        if (!page.imagePreviewUrl) {
          imagePreviewPopover.classList.add("hidden");
          imagePreview.style.backgroundImage = "";
          return;
        }

        imagePreviewPopover.classList.remove("hidden");
        imagePreview.style.aspectRatio = `${getCurrentImageAspectRatio()} / 1`;
        imagePreview.style.backgroundImage = `url("${page.imagePreviewUrl}")`;
        imagePreview.style.backgroundPosition = getImagePreviewPosition(page.imageFocus);
      }

      function getCurrentImageAspectRatio() {
        const page = pages[currentPageIndex];
        const format = availableFormats.find((item) => item.value === page.format);
        const aspectRatio = Number(format && format.imageAspectRatio);

        return Number.isFinite(aspectRatio) && aspectRatio > 0 ? aspectRatio : 1;
      }

      function getImagePreviewPosition(focus) {
        const positions = {
          center: "center center",
          top: "center top",
          bottom: "center bottom",
          left: "left center",
          right: "right center"
        };

        return positions[focus] || positions.center;
      }

      function normalizeCard(card) {
        return {
          format: String(card.format || ""),
          title: String(card.title || ""),
          body: String(card.body || ""),
          caption: String(card.caption || ""),
          category: String(card.category || ""),
          backgroundColor: normalizeColor(card.backgroundColor),
          imageFocus: normalizeImageFocus(card.imageFocus),
          overlayOpacity: clamp(Number(card.overlayOpacity), 0, 80)
        };
      }

      function normalizeImageFocus(value) {
        const focus = String(value || "center").toLowerCase();
        return ["center", "top", "bottom", "left", "right"].includes(focus) ? focus : "center";
      }

      function normalizeColor(value) {
        const color = String(value || "").trim();
        return /^#[0-9a-f]{6}$/i.test(color) ? color : "#f2eee8";
      }

      function normalizeBackendUrl(value) {
        const rawValue = String(value || "").trim();
        if (!rawValue) {
          throw new Error("Backend API URL is missing. Paste the deployed backend URL first.");
        }
        const withScheme = /^https?:\/\//i.test(rawValue) ? rawValue : `http://${rawValue}`;
        return withScheme.replace(/\/$/, "");
      }

      function getBackendUrlForRequest() {
        const backendUrl = normalizeBackendUrl(backendUrlInput.value);

        if (!isBackendUrlLocked) {
          saveBackendUrl(backendUrl);
        }

        return backendUrl;
      }

      function saveBackendUrl(backendUrl) {
        backendUrlInput.value = backendUrl;
        lockBackendUrl(Boolean(backendUrl));
        parent.postMessage({ pluginMessage: { type: "save-backend-url", backendUrl } }, "*");
      }

      function applySettings(settings) {
        const backendUrl = String(settings.backendUrl || "").trim();
        backendUrlInput.value = backendUrl;

        if (backendUrl) {
          lockBackendUrl(true);
          setApiStatus("Saved backend URL loaded. Click Test Backend.");
          loadContentCategories().catch(() => {});
        } else {
          unlockBackendUrl();
          setApiStatus("Backend URL을 붙여넣고 Test Backend를 눌러주세요.");
        }
      }

      function lockBackendUrl(locked) {
        isBackendUrlLocked = locked;
        backendUrlInput.readOnly = locked;
      }

      function unlockBackendUrl() {
        isBackendUrlLocked = false;
        backendUrlInput.readOnly = false;
      }

      function showApiContextMenu(x, y) {
        apiContextMenu.style.left = `${x}px`;
        apiContextMenu.style.top = `${y}px`;
        apiContextMenu.classList.remove("hidden");
      }

      function hideApiContextMenu() {
        apiContextMenu.classList.add("hidden");
      }

      async function fetchWithTimeout(url, options = {}) {
        const { timeoutMs = 12000, ...fetchOptions } = options;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

        try {
          return await fetch(url, {
            ...fetchOptions,
            signal: controller.signal
          });
        } finally {
          clearTimeout(timeoutId);
        }
      }

      function setApiStatus(message, isError = false, isOk = false) {
        apiStatus.textContent = message;
        apiStatus.classList.toggle("error", Boolean(isError));
        apiStatus.classList.toggle("ok", Boolean(isOk));
      }

      function toUserErrorMessage(error, fallback) {
        const message = error && error.message ? error.message : fallback;

        if (/abort/i.test(message)) {
          return "Backend test timed out. Check the deployed URL or wait for the server to wake up.";
        }

        if (/failed to fetch/i.test(message)) {
          return "Cannot reach the backend. Check Backend URL and server deployment.";
        }

        return message;
      }

      function formatToCategory(format) {
        const labels = {
          cover: "Cover",
          story: "Story",
          information: "Info",
          quote: "Quote",
          closing: "Closing"
        };

        return labels[format] || "Category";
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, Number.isFinite(value) ? value : min));
      }

      async function fileToBytes(file) {
        const buffer = await file.arrayBuffer();
        return Array.from(new Uint8Array(buffer));
      }

      function downloadFiles(files) {
        for (const file of files) {
          const blob = new Blob([new Uint8Array(file.bytes)], { type: "image/png" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = file.name;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        }
      }

      function setBusy(button, busy, label) {
        button.disabled = busy;
        button.textContent = label;
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", Boolean(isError));
      }

      loadCurrentPage();
      renderGeneratedFrames();
      parent.postMessage({ pluginMessage: { type: "load-settings" } }, "*");
      parent.postMessage({ pluginMessage: { type: "load-formats" } }, "*");
    </script>
  </body>
</html>
